<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Quiz Viewer</title>

<script src="markdown-it.min.js"></script>

<script>

MathJax = {
    tex:{
        inlineMath:[['$','$'],['\\(','\\)']],
        displayMath:[['$$','$$']]
    },
    startup:{
        typeset:false
    }
};

</script>

<script async
src="../mathjax/es5/tex-mml-chtml.js">
</script>

<style>

:root{
    --font-size:14px;
}


*{
    box-sizing:border-box;
}

html,
body{

    margin:0;
    padding:0;

    color : var(--text);

    background: transparent;

    font-family:
        "Segoe UI",
        sans-serif;
}

#container{

    width:min(1200px, 95vw);

    margin:auto;

    padding:30px;
}

/* ===========================
   Header
=========================== */

#progress{

    color:var(--text-secondary);

    font-size: calc(var(--font-size) + 2px);

    font-weight:600;

    margin-bottom:16px;
}

/* ===========================
   Question
=========================== */

#question{
    background:var(--card);

    border-radius:14px;

    padding:24px;

    border:1px solid var(--border);

    box-shadow:
        0 2px 8px rgba(0,0,0,.05);

    margin-bottom:24px;

    line-height:1.65;

    font-size: calc(var(--font-size) + 10px);

}

/* ===========================
   Options
=========================== */

#options{

    display:flex;

    flex-direction:column;

    gap:14px;
}

.option{

    display:flex;

    gap:18px;

    align-items:flex-start;

    padding:18px;

    border-radius:12px;

    background:var(--card);

    border:1px solid var(--border);

    cursor:pointer;

    transition:
        background .15s,
        border-color .15s,
        transform .15s,
        box-shadow .15s;
}

.option:hover{

    transform:translateY(-2px);

    border-color:var(--card-hover);

    box-shadow:
        0 6px 16px rgba(0,0,0,.08);
}

.option.selected{

    background:var(--card-hover);

    border:4px solid var(--accent);
}

.option.correct{
    color:var(--text);
    background: rgba(0,150,0,0.5);

    border:4px solid #22c55e;
}

.option.incorrect{

    color:var(--text);

    background:rgba(150,0,0,0.5);

    border:4px solid #ef4444;
}

.letter{

    width:36px;

    height:36px;

    border-radius:50%;

    flex-shrink:0;

    display:flex;

    align-items:center;

    justify-content:center;

    font-weight:bold;

    background:var(--card);

    color:var(--text-secondary);
}

.option.selected .letter{

    background:var(--accent);

    color:var(--text);
}

.option.correct .letter{

    background:#22c55e;

    color:white;
}

.option.incorrect .letter{

    background:#ef4444;

    color:white;
}

.content{
    flex:1;

    min-width:0;

    line-height:1.55;

    font-size: calc(var(--font-size) + 6px);

}

.content p:first-child{

    margin-top:0;
}

.content p:last-child{

    margin-bottom:0;
}

/* ===========================
   Feedback
=========================== */

#feedback{

    display:none;

    margin-top:28px;

    background:var(--card);

    border-radius:14px;

    border:1px solid var(--border);

    box-shadow:
        0 2px 8px rgba(0,0,0,.05);

    padding:22px;
}

#feedbackTitle{

    font-size: calc(var(--font-size) + 8px);

    font-weight:bold;

    margin-bottom:14px;
}

.correctText{

    color:#15803d;
}

.incorrectText{

    color:#dc2626;
}

mjx-merror{

    background: transparent !important;

    border: none !important;

    color: inherit !important;
}


::-webkit-scrollbar{

    width:15px;

    height:15px;

}

::-webkit-scrollbar-track{

    background:transparent;

}

::-webkit-scrollbar-thumb{

    background:var(--accent);

    border-radius:5px;

    border:2px solid transparent;

    background-clip:padding-box;

}

::-webkit-scrollbar-thumb:hover{

    background:var(--accent-hover);

    background-clip:padding-box;

}

::-webkit-scrollbar-corner{

    background:transparent;

}

</style>

</head>

<body>

<div id="container">

    <div id="progress"></div>

    <div id="question"></div>

    <div id="options"></div>

    <div id="feedback">

        <div id="feedbackTitle"></div>

        <div id="feedbackBody"></div>

    </div>

</div>
<div id="results-container" style="display:none">
</div>

<script>
let quizLocked = false;
const md = markdownit({

    html:true,
    breaks:true,
    linkify:true,
    typographer:true

});

let selectedOption = null;

let locked = false;

async function renderQuiz(progress, question, options){
    document.getElementById("results-container").style.display = "none";
    document.getElementById("container").style.display = "block";

    selectedOption = null;

    quizLocked = false;

    document.getElementById("feedback").style.display="none";

    document.getElementById("progress").innerHTML = progress;

    document.getElementById("question").innerHTML =
        md.render(question);

    const optionsDiv =
        document.getElementById("options");

    optionsDiv.innerHTML="";

    const letters =
        ["A","B","C","D"];

    options.forEach((text,index)=>{

        const option =
            document.createElement("div");

        option.className="option";

        option.dataset.letter =
            letters[index];

        option.innerHTML=`

            <div class="letter">

                ${letters[index]}

            </div>

            <div class="content">

                ${md.render(text)}

            </div>

        `;

        option.onclick=()=>{

            if(quizLocked)
                return;

            document
                .querySelectorAll(".option")
                .forEach(o=>
                    o.classList.remove("selected")
                );

            option.classList.add("selected");

            selectedOption =
                letters[index];

        };

        optionsDiv.appendChild(option);

    });

    if(window.MathJax){

        MathJax.typesetClear([
        document.getElementById("question"),
        document.getElementById("options")
    ]);

    await MathJax.typesetPromise([
        document.getElementById("question"),
        document.getElementById("options")
    ]);

    }

}

function getSelectedOption(){

    return selectedOption;

}

async function showFeedback(selectedLetter, correctLetter, explanation){

    quizLocked = true;

    document
    .querySelectorAll(".option")
    .forEach(option=>{

        option.classList.remove(

            "selected",

            "correct",

            "incorrect"

        );

        if(option.dataset.letter===correctLetter){

            option.classList.add("correct");

        }

        if(

            option.dataset.letter===selectedLetter &&

            selectedLetter!==correctLetter

        ){

            option.classList.add("incorrect");

        }

    });

    const title =
        document.getElementById(
            "feedbackTitle"
        );

    if(selectedLetter===correctLetter){

        title.innerHTML =
            "✓ Correct";

        title.className =
            "correctText";

    }
    else{

        title.innerHTML =
            "✗ Incorrect";

        title.className =
            "incorrectText";

    }

    document.getElementById(
        "feedbackBody"
    ).innerHTML =
        md.render(explanation);

    document.getElementById(
        "feedback"
    ).style.display =
        "block";

    if(window.MathJax){

        MathJax.typesetClear([
        document.getElementById("feedback")
    ]);

    await MathJax.typesetPromise([
        document.getElementById("feedback")
    ]);


    }

}

function showResults(score, total) {
document.getElementById("container").style.display = "none";

    const results = document.getElementById("results-container");

    results.style.display = "block";
    results.innerHTML = `
        <div class="results">
            <h1 style="text-align: center;">🎉 Quiz Complete!</h1>

            <h1 style="text-align: center;">Your Score : ${score} / ${total} ( ${Math.round(score * 100 / total)}% )</h1>

            <h2 style="text-align: center;">
                Correct: ${score}<br>
                Incorrect: ${total - score}
            </h2>
        </div>
    `;
}

</script>

</body>

</html>
